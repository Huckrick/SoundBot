name: Fast Build (Optimized)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # 缓存配置
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python 缓存
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      # Node 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Electron 缓存
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron
            ~/AppData/Local/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      # 安装依赖（带进度显示）
      - name: Install dependencies
        shell: pwsh
        run: |
          Write-Host "=== Installing Python dependencies ==="
          pip install pyinstaller -q
          
          # 过滤 uvloop
          (Get-Content backend/requirements.txt) | Where-Object { $_ -notmatch 'uvloop' -and $_ -match '\S' } | Set-Content requirements-filtered.txt
          pip install -r requirements-filtered.txt -q
          Remove-Item requirements-filtered.txt
          
          Write-Host "=== Installing Node dependencies ==="
          npm ci --progress=false

      # 构建后端
      - name: Build Backend
        shell: pwsh
        run: |
          Write-Host "=== Building PyInstaller backend ==="
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build --noconfirm
          $backendDir = "../dist/backend/soundbot-backend"
          if (Test-Path $backendDir) {
            $size = [math]::Round((Get-ChildItem $backendDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
            Write-Host "Backend size: $size MB"
          } else {
            Write-Host "Backend directory not found"
            exit 1
          }

      # 构建前端
      - name: Build Frontend
        shell: pwsh
        run: |
          Write-Host "=== Building Electron app ==="
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-windows
          path: dist-electron/*.exe
