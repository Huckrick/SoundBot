name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  build-models:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: pip install transformers torch torchaudio huggingface_hub

      - name: Download AI models
        run: python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Create Models package
        run: |
          mkdir -p release
          cd models
          zip -r ../release/models.zip .
          cd ..
          echo "Models package created:"
          ls -lh release/

      - name: Upload Models artifact
        uses: actions/upload-artifact@v4
        with:
          name: models-package
          path: release/models.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Build PyInstaller backend
        run: |
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build --noconfirm

      - name: Verify backend build
        run: |
          echo "=== Verifying backend build ==="
          if [ -d "dist/backend/soundbot-backend" ]; then
            echo "[OK] Backend directory exists"
            ls -la dist/backend/soundbot-backend/
            du -sh dist/backend/soundbot-backend

            if [ -f "dist/backend/soundbot-backend/soundbot-backend" ]; then
              echo "[OK] Backend executable exists"
            else
              echo "[ERROR] Backend executable not found"
              exit 1
            fi

            if [ -d "dist/backend/soundbot-backend/_internal" ] || [ -d "dist/backend/soundbot-backend/lib" ]; then
              echo "[OK] Runtime directory exists"
            else
              echo "[ERROR] Runtime directory not found"
              exit 1
            fi
          else
            echo "[ERROR] Backend directory not found"
            ls -la dist/backend/
            exit 1
          fi

      - name: Test backend startup (dry-run)
        run: |
          echo "=== Testing backend startup ==="
          # Test that the backend can import main module (dry-run with --help)
          cd dist/backend/soundbot-backend
          if [ -f "soundbot-backend" ]; then
            # Try to run with --help to verify imports work
            ./soundbot-backend --help 2>&1 || true
            echo "[OK] Backend executable runs (import test passed)"
          fi

      - name: Install Node dependencies
        run: npm ci --progress=false

      - name: Build Electron (macOS)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

      - name: Verify Electron build
        run: |
          echo "=== Verifying Electron build ==="
          ls -lh dist-electron/

          if ls dist-electron/*.dmg 1> /dev/null 2>&1; then
            echo "[OK] DMG file created"
          else
            echo "[ERROR] DMG file not found"
            exit 1
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-macos
          path: dist-electron/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron
            ~/AppData/Local/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Python dependencies
        shell: powershell
        run: |
          pip install pyinstaller
          $lines = Get-Content backend/requirements.txt | Where-Object { $_ -notmatch 'uvloop' -and $_ -match '\S' }
          $lines | Set-Content requirements-filtered.txt
          pip install -r requirements-filtered.txt
          Remove-Item requirements-filtered.txt

      - name: Build PyInstaller backend
        shell: powershell
        run: |
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build --noconfirm

      - name: Verify backend build
        shell: powershell
        run: |
          Write-Host "=== Verifying backend build ==="
          $backendDir = 'dist/backend/soundbot-backend'
          if (Test-Path $backendDir) {
            Write-Host "[OK] Backend directory exists"
            Get-ChildItem $backendDir
            $size = [math]::Round((Get-ChildItem $backendDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
            Write-Host "Backend size: $size MB"

            $exePath = Join-Path $backendDir 'soundbot-backend.exe'
            if (Test-Path $exePath) {
              Write-Host "[OK] Backend executable exists"
            } else {
              Write-Host "[ERROR] Backend executable not found"
              exit 1
            }

            $internalDir = Join-Path $backendDir '_internal'
            $libDir = Join-Path $backendDir 'lib'
            $hasInternal = Test-Path $internalDir
            $hasLib = Test-Path $libDir
            if ($hasInternal -or $hasLib) {
              Write-Host "[OK] Runtime directory exists"
            } else {
              Write-Host "[ERROR] Runtime directory not found"
              exit 1
            }
          } else {
            Write-Host "[ERROR] Backend directory not found"
            exit 1
          }

      - name: Test backend startup (dry-run)
        shell: powershell
        run: |
          Write-Host "=== Testing backend startup ==="
          $exePath = 'dist/backend/soundbot-backend/soundbot-backend.exe'
          if (Test-Path $exePath) {
            # Test that the backend can import main module (dry-run)
            & $exePath --help 2>&1 | Write-Host
            Write-Host "[OK] Backend executable runs (import test passed)"
          }

      - name: Install Node dependencies
        run: npm ci --progress=false

      - name: Build Electron (Windows)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

      - name: Verify Electron build
        shell: powershell
        run: |
          Write-Host "=== Verifying Electron build ==="
          Get-ChildItem dist-electron/

          $exeFiles = Get-ChildItem dist-electron/*.exe
          if ($exeFiles) {
            Write-Host "[OK] EXE file created"
          } else {
            Write-Host "[ERROR] EXE file not found"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-windows
          path: dist-electron/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-models, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/models-package/*.zip
            artifacts/soundbot-macos/*.dmg
            artifacts/soundbot-windows/*.exe
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
