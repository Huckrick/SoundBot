name: Build and Release (PyInstaller Version)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 构建模型包（跨平台共享）
  build-models:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install transformers torch torchaudio huggingface_hub

      - name: Download AI models
        run: |
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Create Models package
        run: |
          echo "=== Creating Models package ==="
          mkdir -p release
          cd models
          zip -r ../release/models-${GITHUB_REF_NAME}.zip .
          cd ..
          echo "Models package created:"
          ls -lh release/

      - name: Upload Models artifact
        uses: actions/upload-artifact@v4
        with:
          name: models-package
          path: release/models-*.zip
          if-no-files-found: error

  # 构建 macOS 应用（PyInstaller + Electron）
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Build PyInstaller backend
        run: |
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build

      - name: Check backend size
        run: |
          ls -lh dist/backend/soundbot-backend
          du -sh dist/backend/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify backend exists
        run: |
          echo "=== Verifying backend ==="
          ls -la dist/backend/
          ls -la dist/backend/ | wc -l

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron (macOS)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check build size
        run: |
          echo "=== Build Size ==="
          ls -lh dist-electron/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-macos
          path: dist-electron/*.dmg
          if-no-files-found: error

  # 构建 Windows 应用（PyInstaller + Electron）
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          pip install pyinstaller
          # Windows 不需要 uvloop
          (Get-Content backend/requirements.txt) | Where-Object { $_ -notmatch 'uvloop' -and $_ -match '\S' } | Set-Content requirements-filtered.txt
          pip install -r requirements-filtered.txt
          Remove-Item requirements-filtered.txt

      - name: Build PyInstaller backend
        shell: pwsh
        run: |
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build

      - name: Check backend size
        shell: pwsh
        run: |
          Get-ChildItem dist/backend/soundbot-backend.exe | Select-Object Name, @{Name="SizeMB";Expression={[math]::Round($_.Length/1MB,2)}}
          (Get-ChildItem dist/backend -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify backend exists
        shell: pwsh
        run: |
          Write-Host "=== Verifying backend ==="
          Get-ChildItem dist/backend/ -Recurse
          Write-Host "File count: $((Get-ChildItem dist/backend/ -Recurse).Count)"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron (Windows)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check build size
        shell: pwsh
        run: |
          Get-ChildItem dist-electron/ | ForEach-Object { Write-Host "$($_.Name) - $([math]::Round($_.Length/1MB, 2)) MB" }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-windows
          path: dist-electron/*.exe
          if-no-files-found: error

  # 发布 Release
  release:
    needs: [build-models, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.exe" \) | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
