name: Build and Release (PyInstaller Version)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 构建模型包（跨平台共享）
  build-models:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install transformers torch torchaudio huggingface_hub

      - name: Download AI models
        run: |
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Create Models package
        run: |
          echo "=== Creating Models package ==="
          mkdir -p release
          cd models
          zip -r ../release/models.zip .
          cd ..
          echo "Models package created:"
          ls -lh release/

      - name: Upload Models artifact
        uses: actions/upload-artifact@v4
        with:
          name: models-package
          path: release/models.zip
          if-no-files-found: error

  # 构建 macOS 应用（PyInstaller + Electron）
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Build PyInstaller backend
        run: |
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build

      - name: Verify backend build
        run: |
          echo "=== Verifying backend build ==="
          if [ -d "dist/backend/soundbot-backend" ]; then
            echo "✓ Backend directory exists"
            ls -la dist/backend/soundbot-backend/
            du -sh dist/backend/soundbot-backend
            echo "File count: $(find dist/backend/soundbot-backend -type f | wc -l)"
            
            # 检查关键文件
            if [ -f "dist/backend/soundbot-backend/soundbot-backend" ]; then
              echo "✓ Backend executable exists"
            else
              echo "✗ Backend executable not found"
              exit 1
            fi
            
            # PyInstaller 使用 _internal 目录 (新版本)
            if [ -d "dist/backend/soundbot-backend/_internal" ]; then
              echo "✓ _internal directory exists"
            elif [ -d "dist/backend/soundbot-backend/lib" ]; then
              echo "✓ lib directory exists"
            else
              echo "✗ Neither _internal nor lib directory found"
              exit 1
            fi
          else
            echo "✗ Backend directory not found"
            ls -la dist/backend/
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Build Electron (macOS)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Electron build
        run: |
          echo "=== Verifying Electron build ==="
          ls -lh dist-electron/
          
          # 检查 DMG 文件
          if ls dist-electron/*.dmg 1> /dev/null 2>&1; then
            echo "✓ DMG file created"
            DMG_SIZE=$(du -sh dist-electron/*.dmg | cut -f1)
            echo "DMG size: $DMG_SIZE"
          else
            echo "✗ DMG file not found"
            exit 1
          fi
          
          # 检查 extraResources 是否正确打包
          echo "=== Checking extraResources ==="
          # 挂载 DMG 检查内容
          DMG_FILE=$(ls dist-electron/*.dmg | head -1)
          MOUNT_POINT=$(hdiutil attach "$DMG_FILE" | grep -o '/Volumes/.*')
          if [ -n "$MOUNT_POINT" ]; then
            APP_PATH=$(find "$MOUNT_POINT" -name "*.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              BACKEND_PATH="$APP_PATH/Contents/Resources/backend/soundbot-backend"
              if [ -d "$BACKEND_PATH" ]; then
                echo "✓ Backend found in app bundle"
                ls -la "$BACKEND_PATH"
                du -sh "$BACKEND_PATH"
              else
                echo "✗ Backend not found in app bundle at $BACKEND_PATH"
                echo "Contents of Resources:"
                ls -la "$APP_PATH/Contents/Resources/"
              fi
            fi
            hdiutil detach "$MOUNT_POINT" || true
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-macos
          path: dist-electron/*.dmg
          if-no-files-found: error

  # 构建 Windows 应用（PyInstaller + Electron）
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          pip install pyinstaller
          # Windows 不需要 uvloop
          (Get-Content backend/requirements.txt) | Where-Object { $_ -notmatch 'uvloop' -and $_ -match '\S' } | Set-Content requirements-filtered.txt
          pip install -r requirements-filtered.txt
          Remove-Item requirements-filtered.txt

      - name: Build PyInstaller backend
        shell: pwsh
        run: |
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build

      - name: Verify backend build
        shell: pwsh
        run: |
          Write-Host "=== Verifying backend build ==="
          $backendDir = "dist/backend/soundbot-backend"
          if (Test-Path $backendDir) {
            Write-Host "✓ Backend directory exists"
            Get-ChildItem $backendDir
            $size = (Get-ChildItem $backendDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "Backend size: $([math]::Round($size, 2)) MB"
            Write-Host "File count: $((Get-ChildItem $backendDir -Recurse).Count)"
            
            # 检查关键文件
            if (Test-Path "$backendDir/soundbot-backend.exe") {
              Write-Host "✓ Backend executable exists"
            } else {
              Write-Host "✗ Backend executable not found"
              exit 1
            }
            
            # PyInstaller 使用 _internal 目录 (新版本)
            if (Test-Path "$backendDir/_internal") {
              Write-Host "✓ _internal directory exists"
            } elseif (Test-Path "$backendDir/lib") {
              Write-Host "✓ lib directory exists"
            } else {
              Write-Host "✗ Neither _internal nor lib directory found"
              exit 1
            }
          } else {
            Write-Host "✗ Backend directory not found"
            Get-ChildItem dist/backend/
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Build Electron (Windows)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Electron build
        shell: pwsh
        run: |
          Write-Host "=== Verifying Electron build ==="
          Get-ChildItem dist-electron/
          
          # 检查 EXE 文件
          $exeFiles = Get-ChildItem dist-electron/*.exe
          if ($exeFiles) {
            Write-Host "✓ EXE file created"
            foreach ($file in $exeFiles) {
              $sizeMB = [math]::Round($file.Length / 1MB, 2)
              Write-Host "EXE size: $sizeMB MB"
            }
          } else {
            Write-Host "✗ EXE file not found"
            exit 1
          }
          
          # 检查 extraResources 是否正确打包
          Write-Host "=== Checking extraResources ==="
          $installerExe = Get-ChildItem dist-electron/*.exe | Where-Object { $_.Name -notlike "*Setup*" -and $_.Name -notlike "*installer*" } | Select-Object -First 1
          if ($installerExe) {
            # 解压检查 (使用 7z 如果可用)
            $7zPath = "C:\Program Files\7-Zip\7z.exe"
            if (Test-Path $7zPath) {
              $extractPath = "dist-electron\extracted"
              New-Item -ItemType Directory -Force -Path $extractPath
              & $7zPath x $installerExe.FullName -o$extractPath -y
              $backendPath = "$extractPath\resources\backend\soundbot-backend"
              if (Test-Path $backendPath) {
                Write-Host "✓ Backend found in app bundle"
                Get-ChildItem $backendPath
              } else {
                Write-Host "✗ Backend not found in app bundle"
                Write-Host "Contents of resources:"
                Get-ChildItem "$extractPath\resources\" -Recurse -ErrorAction SilentlyContinue
              }
            } else {
              Write-Host "7-Zip not available, skipping extraction check"
            }
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-windows
          path: dist-electron/*.exe
          if-no-files-found: error

  # 创建 GitHub Release
  create-release:
    needs: [build-models, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/models-package/*.zip
            artifacts/soundbot-macos/*.dmg
            artifacts/soundbot-windows/*.exe
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
