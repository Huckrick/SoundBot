name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python virtual environment
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "Python dependencies installed:"
          pip list | head -20

      - name: Download AI models
        run: |
          cd backend
          source venv/bin/activate
          cd ..
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check macOS build size
        run: |
          echo "=== macOS Build Size ==="
          ls -lh dist/
          du -sh dist/

      - name: List packaged files
        run: |
          echo "=== Checking if venv and models are packaged ==="
          if [ -d "dist/mac/SoundBot.app/Contents/Resources/app" ]; then
            echo "Checking app bundle contents:"
            ls -la "dist/mac/SoundBot.app/Contents/Resources/app/"
            echo ""
            echo "Checking backend/venv:"
            ls -la "dist/mac/SoundBot.app/Contents/Resources/app/backend/" | head -20
            echo ""
            echo "Checking models:"
            ls -la "dist/mac/SoundBot.app/Contents/Resources/app/models/" 2>/dev/null || echo "models not found!"
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundBot-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python virtual environment
        shell: pwsh
        run: |
          cd backend
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "Python dependencies installed:"
          pip list | Select-Object -First 20

      - name: Download AI models
        shell: pwsh
        run: |
          cd backend
          .\venv\Scripts\Activate.ps1
          cd ..
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Windows build size
        run: |
          echo "=== Windows Build Size ==="
          ls -lh dist/
          du -sh dist/

      - name: List packaged files
        shell: pwsh
        run: |
          echo "=== Checking if venv and models are packaged ==="
          if (Test-Path "dist/win-unpacked") {
            echo "Checking unpacked contents:"
            Get-ChildItem "dist/win-unpacked" -Recurse -Depth 2 | Select-Object FullName, Length
            echo ""
            echo "Checking backend:"
            if (Test-Path "dist/win-unpacked/resources/app/backend") {
              Get-ChildItem "dist/win-unpacked/resources/app/backend" | Select-Object Name
            }
            echo ""
            echo "Checking models:"
            if (Test-Path "dist/win-unpacked/resources/app/models") {
              Get-ChildItem "dist/win-unpacked/resources/app/models" -Recurse | Measure-Object -Property Length -Sum
            } else {
              Write-Host "models not found!"
            }
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundBot-Windows
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la artifacts/
          find artifacts/ -type f -name "*"

      - name: Check artifact sizes
        run: |
          echo "=== Artifact Sizes ==="
          find artifacts/ -type f -exec ls -lh {} \;
          echo ""
          echo "Total size per platform:"
          du -sh artifacts/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/SoundBot-macOS/*
            artifacts/SoundBot-Windows/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
