name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. v0.1.2) — required for manual dispatch'
        required: true
        default: 'v0.1.2'

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  build-models:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: pip install transformers torch torchaudio huggingface_hub

      - name: Download AI models
        run: python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Create Models package
        run: |
          mkdir -p release
          cd models
          zip -r ../release/models.zip .
          cd ..
          echo "Models package created:"
          ls -lh release/

      - name: Upload Models artifact
        uses: actions/upload-artifact@v4
        with:
          name: models-package
          path: release/models.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Build PyInstaller backend
        run: |
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build --noconfirm

      - name: Verify backend build
        run: |
          echo "=== Verifying backend build ==="
          if [ -d "dist/backend/soundbot-backend" ]; then
            echo "[OK] Backend directory exists"
            ls -la dist/backend/soundbot-backend/
            du -sh dist/backend/soundbot-backend

            if [ -f "dist/backend/soundbot-backend/soundbot-backend" ]; then
              echo "[OK] Backend executable exists"
            else
              echo "[ERROR] Backend executable not found"
              exit 1
            fi

            if [ -d "dist/backend/soundbot-backend/_internal" ] || [ -d "dist/backend/soundbot-backend/lib" ]; then
              echo "[OK] Runtime directory exists"
            else
              echo "[ERROR] Runtime directory not found"
              exit 1
            fi
          else
            echo "[ERROR] Backend directory not found"
            ls -la dist/backend/
            exit 1
          fi

      - name: Test backend startup
        run: |
          echo "=== Testing backend can start ==="
          export SOUNDBOT_PORT=18765
          export PYTHONIOENCODING=utf-8
          cd dist/backend/soundbot-backend
          ./soundbot-backend > /tmp/backend_stdout.log 2>&1 &
          BACKEND_PID=$!

          # 轮询健康端点，最多等待 60 秒
          STARTED=false
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:18765/api/v1/health > /dev/null 2>&1; then
              STARTED=true
              echo "[OK] Backend responded on attempt $i"
              break
            fi
            # 检查进程是否已提前崩溃
            if ! kill -0 $BACKEND_PID 2>/dev/null; then
              echo "::error::Backend process exited early"
              break
            fi
            sleep 1
          done

          kill $BACKEND_PID 2>/dev/null || true
          wait $BACKEND_PID 2>/dev/null || true

          echo "--- backend output ---"
          cat /tmp/backend_stdout.log | tail -50

          # 检查各类致命错误
          if grep -qiE "Could not import module|ImportError|ModuleNotFoundError|DLL load failed|OSError.*PortAudio|cannot import name" /tmp/backend_stdout.log; then
            echo "::error::Backend failed with import/library error"
            exit 1
          fi

          if [ "$STARTED" != "true" ]; then
            echo "::error::Backend failed to respond to health check within 60 seconds"
            exit 1
          fi
          echo "[OK] Backend started and responded to health check"

      - name: Install Node dependencies
        run: npm ci --progress=false

      - name: Build Electron (macOS)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

      - name: Verify Electron build
        run: |
          echo "=== Verifying Electron build ==="
          ls -lh dist-electron/

          if ls dist-electron/*.dmg 1> /dev/null 2>&1; then
            echo "[OK] DMG file created"
          else
            echo "[ERROR] DMG file not found"
            exit 1
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-macos
          path: dist-electron/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron
            ~/AppData/Local/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Python dependencies
        shell: powershell
        run: |
          pip install pyinstaller
          $lines = Get-Content backend/requirements.txt | Where-Object { $_ -notmatch 'uvloop' -and $_ -match '\S' }
          $lines | Set-Content requirements-filtered.txt
          pip install -r requirements-filtered.txt
          Remove-Item requirements-filtered.txt

      - name: Build PyInstaller backend
        shell: powershell
        run: |
          cd backend
          pyinstaller main.spec --distpath ../dist/backend --workpath ../dist/build --noconfirm

      - name: Verify backend build
        shell: powershell
        run: |
          Write-Host "=== Verifying backend build ==="
          $backendDir = 'dist/backend/soundbot-backend'
          if (Test-Path $backendDir) {
            Write-Host "[OK] Backend directory exists"
            Get-ChildItem $backendDir
            $size = [math]::Round((Get-ChildItem $backendDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
            Write-Host "Backend size: $size MB"

            $exePath = Join-Path $backendDir 'soundbot-backend.exe'
            if (Test-Path $exePath) {
              Write-Host "[OK] Backend executable exists"
            } else {
              Write-Host "[ERROR] Backend executable not found"
              exit 1
            }

            $internalDir = Join-Path $backendDir '_internal'
            $libDir = Join-Path $backendDir 'lib'
            $hasInternal = Test-Path $internalDir
            $hasLib = Test-Path $libDir
            if ($hasInternal -or $hasLib) {
              Write-Host "[OK] Runtime directory exists"
            } else {
              Write-Host "[ERROR] Runtime directory not found"
              exit 1
            }
          } else {
            Write-Host "[ERROR] Backend directory not found"
            exit 1
          }

      - name: Test backend startup
        shell: powershell
        run: |
          Write-Host "=== Testing backend can start ==="
          $env:SOUNDBOT_PORT = "18765"
          $env:PYTHONIOENCODING = "utf-8"
          $exePath = Resolve-Path 'dist\backend\soundbot-backend\soundbot-backend.exe'
          $proc = Start-Process -FilePath $exePath `
            -RedirectStandardOutput backend_stdout.log `
            -RedirectStandardError backend_stderr.log `
            -WorkingDirectory (Split-Path $exePath) `
            -PassThru

          # 轮询健康端点，最多等待 60 秒
          $started = $false
          for ($i = 1; $i -le 60; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri 'http://127.0.0.1:18765/api/v1/health' -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop
              if ($resp.StatusCode -eq 200) {
                $started = $true
                Write-Host "[OK] Backend responded on attempt $i"
                break
              }
            } catch {}

            if ($proc.HasExited) {
              Write-Host "::error::Backend process exited early with code $($proc.ExitCode)"
              break
            }
            Start-Sleep -Seconds 1
          }

          if (!$proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
          Start-Sleep -Seconds 1

          Write-Host "--- stdout ---"
          if (Test-Path backend_stdout.log) { Get-Content backend_stdout.log | Select-Object -Last 50 }
          Write-Host "--- stderr ---"
          if (Test-Path backend_stderr.log) { Get-Content backend_stderr.log | Select-Object -Last 50 }

          $allOutput = ""
          if (Test-Path backend_stdout.log) { $allOutput += Get-Content backend_stdout.log -Raw }
          if (Test-Path backend_stderr.log) { $allOutput += Get-Content backend_stderr.log -Raw }

          # 检查各类致命错误
          if ($allOutput -match "Could not import module|ImportError|ModuleNotFoundError|DLL load failed|PortAudio|cannot import name") {
            Write-Host "::error::Backend failed with import/library error"
            exit 1
          }

          if (-not $started) {
            Write-Host "::error::Backend failed to respond to health check within 60 seconds"
            exit 1
          }
          Write-Host "[OK] Backend started and responded to health check"

      - name: Install Node dependencies
        run: npm ci --progress=false

      - name: Build Electron (Windows)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

      - name: Verify Electron build
        shell: powershell
        run: |
          Write-Host "=== Verifying Electron build ==="
          Get-ChildItem dist-electron/

          $exeFiles = Get-ChildItem dist-electron/*.exe
          if ($exeFiles) {
            Write-Host "[OK] EXE file created"
          } else {
            Write-Host "[ERROR] EXE file not found"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundbot-windows
          path: dist-electron/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-models, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            artifacts/models-package/*.zip
            artifacts/soundbot-macos/*.dmg
            artifacts/soundbot-windows/*.exe
          draft: true
          prerelease: true
          generate_release_notes: true
          name: "SoundBot ${{ steps.tag.outputs.name }} Alpha"
          body: |
            ## SoundBot ${{ steps.tag.outputs.name }} Alpha

            ### 修复内容
            - 修复 Windows 后端启动失败（PortAudio DLL 未打包）
            - 改善音频设备不可用时的错误处理
            - 加强 CI 构建验证（实际测试健康端点）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
